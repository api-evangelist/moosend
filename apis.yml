aid: moosend
name: Moosend
description: >-
  Moosend is an email marketing and automation platform with a REST API for
  managing mailing lists, campaigns, subscribers, automations, and tracking
  email performance metrics. The API uses HTTPS with API key authentication and
  provides programmatic access to email lists, subscriber management, campaign
  creation and scheduling, audience segmentation, transactional emails, and
  real-time reporting.
